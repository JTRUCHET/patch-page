<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patch RESOTECH</title>

  <style>
    :root {
      --bg: #f4f4f4;
      --dark: #111827;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #222222;
      --muted: #6b7280;
      --accent: #e11d48;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--dark);
      color: white;
      padding: 22px 28px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.3px;
    }

    header p {
      margin: 8px 0 0;
      color: #d1d5db;
      font-size: 14px;
    }

    main {
      padding: 24px;
    }

    .cartouche-box {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .cartouche-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .cartouche-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .cartouche-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
    }

    .mini-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fafafa;
    }

    .mini-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 11px 15px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-button:hover {
      border-color: var(--accent);
    }

    .tab-button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tab-panel {
      display: none;
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .tab-panel.active {
      display: block;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .refresh-button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .refresh-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    iframe {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
    }

    .infos-frame {
      height: 230px;
    }

    .commentaire-frame {
      height: 230px;
    }

    .form-frame {
      height: 650px;
    }

    .view-frame {
      height: 780px;
    }

    footer {
      padding: 0 24px 24px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .cartouche-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      header {
        padding: 20px;
      }

      main {
        padding: 16px;
      }

      .tab-panel,
      .cartouche-box {
        padding: 14px;
      }

      .section-header,
      .cartouche-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .infos-frame,
      .commentaire-frame {
        height: 260px;
      }

      .form-frame,
      .view-frame {
        height: 680px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Patch RESOTECH</h1>
    <p>Portail de rappel et consultation des feuilles de patch.</p>
  </header>

  <main>
    <section class="cartouche-box">
      <div class="cartouche-header">
        <h2>Cartouche projet</h2>

        <div class="button-row">
          <button class="refresh-button" onclick="reloadIframe('infosFrame')">
            Rafraîchir infos
          </button>

          <button class="refresh-button" onclick="reloadIframe('commentaireFrame')">
            Rafraîchir commentaire
          </button>
        </div>
      </div>

      <div class="cartouche-grid">
        <div class="mini-card">
          <h3>Infos</h3>

          <iframe
            id="infosFrame"
            class="airtable-embed infos-frame"
            src="https://airtable.com/embed/appk3300Pio4Oia0a/shroVkbLZ6afeTh4S"
            frameborder="0"
            onmousewheel=""
            width="100%"
            height="230"
            style="background: transparent; border: 1px solid #ccc;">
          </iframe>
        </div>

        <div class="mini-card">
          <h3>Commentaire</h3>

          <iframe
            id="commentaireFrame"
            class="airtable-embed commentaire-frame"
            src="https://airtable.com/embed/appk3300Pio4Oia0a/shraKL91MWTGYdLcc"
            frameborder="0"
            onmousewheel=""
            width="100%"
            height="230"
            style="background: transparent; border: 1px solid #ccc;">
          </iframe>
        </div>
      </div>
    </section>

    <div class="tabs">
      <button class="tab-button active" onclick="openTab('selectionPatch', this, 'selectionPatchFrame')">
        1 — Sélection patch
      </button>

      <button class="tab-button" onclick="openTab('patchIn', this, 'patchInFrame')">
        2 — Patch IN
      </button>

      <button class="tab-button" onclick="openTab('cablageIn', this, 'cablageInFrame')">
        3 — Câblage IN
      </button>

      <button class="tab-button" onclick="openTab('kit', this, 'kitFrame')">
        4 — Kit
      </button>

      <button class="tab-button" onclick="openTab('cablageOut', this, 'cablageOutFrame')">
        5 — Câblage OUT
      </button>

      <button class="tab-button" onclick="openTab('recapKit', this, 'recapKitFrame')">
        6 — Récap Kit
      </button>

      <button class="tab-button" onclick="openTab('recapCablage', this, 'recapCablageFrame')">
        7 — Récap Câblage
      </button>
    </div>

    <section id="selectionPatch" class="tab-panel active">
      <div class="section-header">
        <h2>Sélection patch</h2>
      </div>

      <iframe
        id="selectionPatchFrame"
        class="airtable-embed form-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/pagm7SkUowrxaXnhi/form"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="650"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="patchIn" class="tab-panel">
      <div class="section-header">
        <h2>Patch IN</h2>
        <button class="refresh-button" onclick="reloadIframe('patchInFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="patchInFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shr3uapd3j1O4sr98?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="cablageIn" class="tab-panel">
      <div class="section-header">
        <h2>Câblage IN</h2>
        <button class="refresh-button" onclick="reloadIframe('cablageInFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="cablageInFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shrCkP44QlwoJco8A?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="kit" class="tab-panel">
      <div class="section-header">
        <h2>Kit</h2>
        <button class="refresh-button" onclick="reloadIframe('kitFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="kitFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shrccX8ePHbmtY5Qc?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="cablageOut" class="tab-panel">
      <div class="section-header">
        <h2>Câblage OUT</h2>
        <button class="refresh-button" onclick="reloadIframe('cablageOutFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="cablageOutFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shrtqPY1V2YOPABpO?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="recapKit" class="tab-panel">
      <div class="section-header">
        <h2>Récap Kit</h2>
        <button class="refresh-button" onclick="reloadIframe('recapKitFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="recapKitFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shrRvgAj9QcVHkEXL?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="recapCablage" class="tab-panel">
      <div class="section-header">
        <h2>Récap Câblage</h2>
        <button class="refresh-button" onclick="reloadIframe('recapCablageFrame')">
          Rafraîchir
        </button>
      </div>

      <iframe
        id="recapCablageFrame"
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shrndSnIy5my1h4eW?viewControls=on"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="780"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>
  </main>

  <footer>
    Portail technique RESOTECH — 791 Concept
  </footer>

  <script>
    function reloadIframe(iframeId) {
      const iframe = document.getElementById(iframeId);
      if (!iframe) return;

      const currentSrc = iframe.getAttribute("src");
      const cleanSrc = currentSrc.split("&refresh=")[0].split("?refresh=")[0];

      const separator = cleanSrc.includes("?") ? "&" : "?";
      iframe.setAttribute("src", cleanSrc + separator + "refresh=" + Date.now());
    }

    function openTab(tabId, button, iframeId) {
      const panels = document.querySelectorAll(".tab-panel");
      const buttons = document.querySelectorAll(".tab-button");

      panels.forEach(panel => panel.classList.remove("active"));
      buttons.forEach(btn => btn.classList.remove("active"));

      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");

      if (iframeId) {
        reloadIframe(iframeId);
      }

      reloadIframe("infosFrame");
      reloadIframe("commentaireFrame");
    }
  </script>
</body>
</html>
