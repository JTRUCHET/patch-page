<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patch RESOTECH</title>

  <style>
    :root {
      --bg: #f4f4f4;
      --dark: #111827;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #222222;
      --muted: #6b7280;
      --accent: #e11d48;
      --accent-soft: #ffe4ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--dark);
      color: white;
      padding: 22px 28px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.3px;
    }

    header p {
      margin: 8px 0 0;
      color: #d1d5db;
      font-size: 14px;
    }

    main {
      padding: 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-button:hover {
      border-color: var(--accent);
    }

    .tab-button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tab-panel {
      display: none;
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .tab-panel.active {
      display: block;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    iframe {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
    }

    .form-frame {
      height: 650px;
    }

    .view-frame {
      height: 760px;
    }

    footer {
      padding: 0 24px 24px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 700px) {
      header {
        padding: 20px;
      }

      main {
        padding: 16px;
      }

      .tab-panel {
        padding: 14px;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .hint {
        text-align: left;
      }

      .form-frame,
      .view-frame {
        height: 680px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Patch RESOTECH</h1>
    <p>Portail de rappel et consultation des feuilles de patch.</p>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-button active" onclick="openTab('rappel', this)">
        1 — Rappeler un patch
      </button>

      <button class="tab-button" onclick="openTab('patch', this)">
        2 — Patch / Câblage IN
      </button>
    </div>

    <section id="rappel" class="tab-panel active">
      <div class="section-header">
        <h2>Rappeler un patch</h2>
        <span class="hint">Sélectionne une sauvegarde, puis envoie la demande.</span>
      </div>

      <iframe
        class="airtable-embed form-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/pagm7SkUowrxaXnhi/form"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="650"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>

    <section id="patch" class="tab-panel">
      <div class="section-header">
        <h2>Patch / Câblage IN</h2>
        <span class="hint">Vue Airtable en lecture seule.</span>
      </div>

      <iframe
        class="airtable-embed view-frame"
        src="https://airtable.com/embed/appk3300Pio4Oia0a/shr3uapd3j1O4sr98"
        frameborder="0"
        onmousewheel=""
        width="100%"
        height="760"
        style="background: transparent; border: 1px solid #ccc;">
      </iframe>
    </section>
  </main>

  <footer>
    Portail technique RESOTECH — 791 Concept
  </footer>

  <script>
    function openTab(tabId, button) {
      const panels = document.querySelectorAll(".tab-panel");
      const buttons = document.querySelectorAll(".tab-button");

      panels.forEach(panel => panel.classList.remove("active"));
      buttons.forEach(btn => btn.classList.remove("active"));

      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");
    }
  </script>
</body>
</html>
